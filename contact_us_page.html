<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Contact Us</title>
        <link rel="stylesheet" href="travel_recommendation.css">
    </head>
    <body class="contact-us-page">
        <nav class="navbar">
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about_us_page.html">About Us</a></li>
                <li><a href="contact_us_page.html">Contact Us</a></li>
            </ul>
        </nav>
        <h1>Contact Us</h1>
        <div id="contact-us-content">
            <p>We'd love to hear from you! If you have any questions, feedback, or suggestions, please don't hesitate to reach out to us.</p>
            <form action="#" method="post">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <button type="submit">Send Message</button>
            </form>
        </div>
        <script src="travel_recommendation.js"></script>
    </body>
</html>
